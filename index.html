  <script type="text/babel">
    const { useState, useCallback, useMemo, useEffect } = React;

    // --- Inline SVG 元件 ---

    const HomeIcon = ({ className }) => (

    const BookOpen = ({ className }) => (

    const Headphones = ({ className }) => (

    const Gamepad2 = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>

        <rect x="2" y="6" width="20" height="12" rx="2"></rect>
      </svg>
    );
    const CheckSquare = ({ className, checked }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill={checked ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>

    // --- 資料庫定義 ---
    const GOJUON_DATA = [
      { id: 'a', labelH: 'あ行 (a)', labelK: 'ア行 (a)', chars: [{ h: 'あ', k: 'ア', r: 'a' }, { h: 'い', k: 'イ', r: 'i' }, { h: 'う', k: 'ウ', r: 'u' }, { h: 'え', k: 'エ', r: 'e' }, { h: 'お', k: 'オ', r: 'o' }] },
      { id: 'ka', labelH: 'か行 (ka)', labelK: 'カ行 (ka)', chars: [{ h: 'か', k: 'カ', r: 'ka' }, { h: 'き', k: 'キ', r: 'ki' }, { h: 'く', k: 'ク', r: 'ku' }, { h: 'け', k: 'ケ', r: 'ke' }, { h: 'こ', k: 'コ', r: 'ko' }] },
      { id: 'sa', labelH: 'さ行 (sa)', labelK: 'サ行 (sa)', chars: [{ h: 'さ', k: 'サ', r: 'sa' }, { h: 'し', k: 'シ', r: 'shi' }, { h: 'す', k: 'ス', r: 'su' }, { h: 'せ', k: 'セ', r: 'se' }, { h: 'そ', k: 'ソ', r: 'so' }] },
      { id: 'ta', labelH: 'た行 (ta)', labelK: 'タ行 (ta)', chars: [{ h: 'た', k: 'タ', r: 'ta' }, { h: 'ち', k: 'チ', r: 'chi' }, { h: 'つ', k: 'ツ', r: 'tsu' }, { h: 'て', k: 'テ', r: 'te' }, { h: 'と', k: 'ト', r: 'to' }] },
      { id: 'na', labelH: 'な行 (na)', labelK: 'ナ行 (na)', chars: [{ h: 'な', k: 'ナ', r: 'na' }, { h: 'に', k: 'ニ', r: 'ni' }, { h: 'ぬ', k: 'ヌ', r: 'nu' }, { h: 'ね', k: 'ネ', r: 'ne' }, { h: 'の', k: 'ノ', r: 'no' }] },
      { id: 'ha', labelH: 'は行 (ha)', labelK: 'ハ行 (ha)', chars: [{ h: 'は', k: 'ハ', r: 'ha' }, { h: 'ひ', k: 'ヒ', r: 'hi' }, { h: 'ふ', k: 'フ', r: 'fu' }, { h: 'へ', k: 'ヘ', r: 'he' }, { h: 'ほ', k: 'ホ', r: 'ho' }] },
      { id: 'ma', labelH: 'ま行 (ma)', labelK: 'マ行 (ma)', chars: [{ h: 'ま', k: 'マ', r: 'ma' }, { h: 'み', k: 'ミ', r: 'mi' }, { h: 'む', k: 'ム', r: 'mu' }, { h: 'め', k: 'メ', r: 'me' }, { h: 'も', k: 'モ', r: 'mo' }] },
      { id: 'ya', labelH: 'や行 (ya)', labelK: 'ヤ行 (ya)', chars: [{ h: 'や', k: 'ヤ', r: 'ya' }, { h: 'ゆ', k: 'ユ', r: 'yu' }, { h: 'よ', k: 'ヨ', r: 'yo' }] },
      { id: 'ra', labelH: 'ら行 (ra)', labelK: 'ラ行 (ra)', chars: [{ h: 'ら', k: 'ラ', r: 'ra' }, { h: 'り', k: 'リ', r: 'ri' }, { h: 'る', k: 'ル', r: 'ru' }, { h: 'れ', k: 'レ', r: 're' }, { h: 'ろ', k: 'ロ', r: 'ro' }] },
      { id: 'wa', labelH: 'わ行 (wa)', labelK: 'ワ行 (wa)', chars: [{ h: 'わ', k: 'ワ', r: 'wa' }, { h: 'を', k: 'ヲ', r: 'wo' }, { h: 'ん', k: 'ン', r: 'n' }] },
      // 濁音與半濁音
      { id: 'ga', labelH: 'が行 (ga) [濁音]', labelK: 'ガ行 (ga) [濁音]', chars: [{ h: 'が', k: 'ガ', r: 'ga' }, { h: 'ぎ', k: 'ギ', r: 'gi' }, { h: 'ぐ', k: 'グ', r: 'gu' }, { h: 'げ', k: 'ゲ', r: 'ge' }, { h: 'ご', k: 'ゴ', r: 'go' }] },
      { id: 'za', labelH: 'ざ行 (za) [濁音]', labelK: 'ザ行 (za) [濁音]', chars: [{ h: 'ざ', k: 'ザ', r: 'za' }, { h: 'じ', k: 'ジ', r: 'ji' }, { h: 'ず', k: 'ズ', r: 'zu' }, { h: 'ぜ', k: 'ゼ', r: 'ze' }, { h: 'ぞ', k: 'ゾ', r: 'zo' }] },
      { id: 'da', labelH: 'だ行 (da) [濁音]', labelK: 'ダ行 (da) [濁音]', chars: [{ h: 'だ', k: 'ダ', r: 'da' }, { h: 'ぢ', k: 'ヂ', r: 'ji' }, { h: 'づ', k: 'ヅ', r: 'zu' }, { h: 'で', k: 'デ', r: 'de' }, { h: 'ど', k: 'ド', r: 'do' }] },
      { id: 'ba', labelH: 'ば行 (ba) [濁音]', labelK: 'バ行 (ba) [濁音]', chars: [{ h: 'ば', k: 'バ', r: 'ba' }, { h: 'び', k: 'ビ', r: 'bi' }, { h: 'ぶ', k: 'ブ', r: 'bu' }, { h: 'べ', k: 'ベ', r: 'be' }, { h: 'ぼ', k: 'ボ', r: 'bo' }] },
      { id: 'pa', labelH: 'ぱ行 (pa) [半濁音]', labelK: 'パ行 (pa) [半濁音]', chars: [{ h: 'ぱ', k: 'パ', r: 'pa' }, { h: 'ぴ', k: 'ピ', r: 'pi' }, { h: 'ぷ', k: 'プ', r: 'pu' }, { h: 'ぺ', k: 'ペ', r: 'pe' }, { h: 'ぽ', k: 'ポ', r: 'po' }] },
    ];

    const VOCAB_LIST = [
      { word: 'あい', meaning: '愛', chars: ['あ', 'い'] },
      { word: 'いえ', meaning: '房子', chars: ['い', 'え'] },
      { word: 'あお', meaning: '藍色', chars: ['あ', 'お'] },
      { word: 'あき', meaning: '秋天', chars: ['あ', 'き'] },
      { word: 'いか', meaning: '烏賊', chars: ['い', 'か'] },
      { word: 'かお', meaning: '臉', chars: ['か', 'お'] },
      { word: 'あさ', meaning: '早上', chars: ['あ', 'さ'] },
      { word: 'あし', meaning: '腳', chars: ['あ', 'し'] },
      { word: 'いす', meaning: '椅子', chars: ['い', 'す'] },
      { word: 'かさ', meaning: '傘', chars: ['か', 'さ'] },
      { word: 'しか', meaning: '鹿', chars: ['し', 'か'] },
      { word: 'うた', meaning: '歌', chars: ['う', 'た'] },
      { word: 'おと', meaning: '聲音', chars: ['お', 'と'] },
      { word: 'なに', meaning: '什麼', chars: ['な', 'に'] },
      { word: 'いぬ', meaning: '狗', chars: ['い', 'ぬ'] },
      { word: 'ねこ', meaning: '貓', chars: ['ね', 'こ'] },
      { word: 'はな', meaning: '花', chars: ['は', 'な'] },
      { word: 'ふね', meaning: '船', chars: ['ふ', 'ね'] },
      { word: 'ほし', meaning: '星星', chars: ['ほ', 'し'] },
      { word: 'あめ', meaning: '雨', chars: ['あ', 'め'] },
      { word: 'うみ', meaning: '海', chars: ['う', 'み'] },
      { word: 'やま', meaning: '山', chars: ['や', 'ま'] },
      { word: 'ゆき', meaning: '雪', chars: ['ゆ', 'き'] },
      { word: 'とり', meaning: '鳥', chars: ['と', 'り'] },
      { word: 'さくら', meaning: '櫻花', chars: ['さ', 'く', 'ら'] },
      { word: 'わたし', meaning: '我', chars: ['わ', 'た', 'し'] },
      { word: 'かわ', meaning: '河川', chars: ['か', 'わ'] },
      { word: 'かぎ', meaning: '鑰匙', chars: ['か', 'ぎ'] },
      { word: 'かぜ', meaning: '風', chars: ['か', 'ぜ'] },
      { word: 'みず', meaning: '水', chars: ['み', 'ず'] },
      { word: 'でんわ', meaning: '電話', chars: ['で', 'ん', 'わ'] }
    ].map(item => ({ ...item, wordH: item.wordH || item.word }));

    const shuffle = (array) => {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    };

    const convertToKatakanaVocab = (hiraganaStr) => {
      if (!hiraganaStr) return '';
      const hToKMap = {};
      GOJUON_DATA.forEach(row => {
        row.chars.forEach(c => {
          hToKMap[c.h] = c.k;
        });
      });
      return hiraganaStr.split('').map(char => hToKMap[char] || char).join('');
    };

    const kanaToRowMap = {};
    GOJUON_DATA.forEach(row => {
      row.chars.forEach(c => {
        kanaToRowMap[c.h] = row.id;
        kanaToRowMap[c.k] = row.id;
      });
    });

    function App() {
      const [screen, setScreen] = useState('home'); 
      const [kanaType, setKanaType] = useState('hiragana'); 
      const [selectedRows, setSelectedRows] = useState(['a', 'ka']);
      const [quizModes, setQuizModes] = useState(['kanaToRomaji']); 
      const [vocabAutoPlay, setVocabAutoPlay] = useState(true);

      const [currentRowIndex, setCurrentRowIndex] = useState(0); 
      const [rowResults, setRowResults] = useState([]); 
      
      const [questions, setQuestions] = useState([]);      
      const [learnItems, setLearnItems] = useState([]);    
      const [learnIndex, setLearnIndex] = useState(0);     
      const [currentIndex, setCurrentIndex] = useState(0); 
      const [score, setScore] = useState(0); 
      const [rowScore, setRowScore] = useState(0); 
      const [isAnswered, setIsAnswered] = useState(false);
      const [selectedOption, setSelectedOption] = useState(null);

      // 預先載入語音包，確保 Android / Chrome 能抓到語音清單
      useEffect(() => {
        const initVoices = () => {
          if ('speechSynthesis' in window) {
            window.speechSynthesis.getVoices();
          }
        };
        initVoices();
        if ('speechSynthesis' in window) {
          window.speechSynthesis.onvoiceschanged = initVoices;
        }
      }, []);

      // 播放語音機制：強制綁定日文，解決「頓」與中文怪音問題
      const playAudio = useCallback((text) => {
        if (!text) return;
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
          
          const utterance = new SpeechSynthesisUtterance(text);
          utterance.lang = 'ja-JP'; 
          utterance.rate = 0.85; // 放慢發音速度讓初學者聽得更清楚
          
          // 強制搜尋並套用系統內的日文語音引擎
          const voices = window.speechSynthesis.getVoices();
          const jaVoices = voices.filter(voice => 
            voice.lang === 'ja-JP' || 
            voice.lang === 'ja_JP' || 
            voice.lang.includes('ja-') ||
            voice.name.toLowerCase().includes('japan')
          );
          
          if (jaVoices.length > 0) {
            // 優先找尋 Google 的日文語音包，發音最標準，否則使用找到的第一個日文語音
            const googleVoice = jaVoices.find(v => v.name.includes('Google'));
            utterance.voice = googleVoice || jaVoices[0];
          }

          window.speechSynthesis.speak(utterance);
        }
      }, []);

      const availableVocab = useMemo(() => {
        if (selectedRows.length === 0) return [];
        return VOCAB_LIST.filter(vocab => {
          return vocab.chars.every(char => {
            const rowId = kanaToRowMap[char];
            return selectedRows.includes(rowId);
          });
        });
      }, [selectedRows]);

      const handleToggleRow = (rowId) => {
        setSelectedRows(prev => 
          prev.includes(rowId) ? prev.filter(id => id !== rowId) : [...prev, rowId]
        );
      };

      const handleSelectAll = (isSeion) => {
        const seionIds = GOJUON_DATA.slice(0, 10).map(r => r.id);
        const dakuonIds = GOJUON_DATA.slice(10).map(r => r.id);
        const targetIds = isSeion ? seionIds : dakuonIds;
        
        const allIncluded = targetIds.every(id => selectedRows.includes(id));
        
        if (allIncluded) {
          setSelectedRows(prev => prev.filter(id => !targetIds.includes(id)));
        } else {
          setSelectedRows(prev => Array.from(new Set([...prev, ...targetIds])));
        }
      };

      const handleToggleQuizMode = (mode) => {
        setQuizModes(prev => 
          prev.includes(mode) ? prev.filter(m => m !== mode) : [...prev, mode]
        );
      };

      // 檢查是否能開始測驗 (防呆機制)
      const isStartDisabled = useMemo(() => {
        if (selectedRows.length === 0) return true;
        const hasKanaMode = quizModes.includes('kanaToRomaji') || quizModes.includes('romajiToKana');
        const hasVocabMode = quizModes.includes('vocab');

        if (!hasKanaMode && !hasVocabMode) return true;

        if (!hasKanaMode && hasVocabMode) {
           let validVocabCount = 0;
           for (let i = 0; i < selectedRows.length; i++) {
             const rowId = selectedRows[i];
             const allowedRowIds = selectedRows.slice(0, i + 1);
             const vocabForThisRow = VOCAB_LIST.filter(vocab => {
                const hasActiveRowChar = vocab.chars.some(char => kanaToRowMap[char] === rowId);
                const allCharsInAllowed = vocab.chars.every(char => allowedRowIds.includes(kanaToRowMap[char]));
                return hasActiveRowChar && allCharsInAllowed;
             });
             validVocabCount += vocabForThisRow.length;
           }
           if (validVocabCount === 0) return true;
        }
        return false;
      }, [selectedRows, quizModes]);

      // 建立假名選項 (防雷、取代 flatMap)
      const createKanaQuestion = (target, fullPool, mode) => {
        let sameRowChars = fullPool.filter(c => c.rowId === target.rowId && c.r !== target.r);
        let otherRowsChars = fullPool.filter(c => c.rowId !== target.rowId);
        
        let distractors = [];
        distractors.push(...shuffle(sameRowChars).slice(0, 3));
        if (distractors.length < 3) {
          distractors.push(...shuffle(otherRowsChars).slice(0, 3 - distractors.length));
        }
        if (distractors.length < 3) {
           // 使用 reduce 取代 flatMap 確保手機與舊瀏覽器相容
           const allChars = GOJUON_DATA.reduce((acc, r) => acc.concat(r.chars), []).filter(c => c.r !== target.r && !distractors.find(d => d.r === c.r));
           distractors.push(...shuffle(allChars).slice(0, 3 - distractors.length));
        }

        return {
          type: 'char',
          format: mode,
          target: target,
          options: shuffle([target, ...distractors])
        };
      };

      const startQuizForCurrentRow = (rowIndex) => {
        const activeRowId = selectedRows[rowIndex];
        const rowData = GOJUON_DATA.find(r => r.id === activeRowId);
        if (!rowData) return;

        let charPool = [];
        let fullSelectedPool = [];
        
        selectedRows.forEach(id => {
          const r = GOJUON_DATA.find(row => row.id === id);
          if(r) fullSelectedPool.push(...r.chars.map(c => ({...c, rowId: r.id})));
        });

        rowData.chars.forEach((charObj, cIdx) => {
          charPool.push({ 
            ...charObj, 
            rowId: rowData.id, 
            rowLabelH: rowData.labelH,
            rowLabelK: rowData.labelK,
            sortOrder: cIdx 
          });
        });

        let newQuestions = [];
        let itemsToLearn = [];

        const hasCharMode = quizModes.includes('kanaToRomaji') || quizModes.includes('romajiToKana');

        if (hasCharMode) {
          itemsToLearn.push(...charPool.map(c => ({ type: 'char', data: c })));

          if (quizModes.includes('kanaToRomaji')) {
            newQuestions.push(...charPool.map(target => createKanaQuestion(target, fullSelectedPool, 'kanaToRomaji')));
          }
          if (quizModes.includes('romajiToKana')) {
            newQuestions.push(...charPool.map(target => createKanaQuestion(target, fullSelectedPool, 'romajiToKana')));
          }
        }

        if (quizModes.includes('vocab')) {
          const allowedRowIds = selectedRows.slice(0, rowIndex + 1);
          const rowRelatedVocab = VOCAB_LIST.filter(vocab => {
            const hasActiveRowChar = vocab.chars.some(char => kanaToRowMap[char] === activeRowId);
            const allCharsInAllowed = vocab.chars.every(char => allowedRowIds.includes(kanaToRowMap[char]));
            return hasActiveRowChar && allCharsInAllowed;
          });

          const shuffledVocab = shuffle(rowRelatedVocab).slice(0, 5);
          
          if (shuffledVocab.length > 0) {
            itemsToLearn.push(...shuffledVocab.map(v => ({ type: 'vocab', data: v })));
            
            newQuestions.push(...shuffledVocab.map(target => {
              let distractors = VOCAB_LIST.filter(v => v.word !== target.word);
              distractors = shuffle(distractors).slice(0, 3);
              return { type: 'vocab', target, options: shuffle([target, ...distractors]) };
            }));
          }
        }

        if (newQuestions.length === 0) {
          const nextIndex = rowIndex + 1;
          if (nextIndex < selectedRows.length) {
            setCurrentRowIndex(nextIndex);
            startQuizForCurrentRow(nextIndex);
          } else {
            setScreen('result');
          }
          return;
        }

        setQuestions(shuffle(newQuestions));
        setLearnItems(itemsToLearn);
        setCurrentIndex(0);
        setLearnIndex(0);
        setIsAnswered(false);
        setSelectedOption(null);
        setRowScore(0);
        setScreen('learn');

        // 播放學習畫面第一張卡片的發音
        const firstItem = itemsToLearn[0];
        if (firstItem) {
          const pron = firstItem.type === 'vocab' 
              ? (kanaType === 'katakana' ? convertToKatakanaVocab(firstItem.data.wordH) : firstItem.data.wordH) 
              : (kanaType === 'katakana' ? firstItem.data.k : firstItem.data.h);
          playAudio(pron);
        }
      }; // 這裡補上了遺失的大括號！

      const startQuiz = () => {
        if (isStartDisabled) return;
        setRowResults([]);
        setScore(0);
        setCurrentRowIndex(0);
        startQuizForCurrentRow(0);
      };

      const proceedToQuiz = () => {
        setScreen('quiz');
        const firstQ = questions[0];
        if (firstQ && firstQ.type === 'vocab' && vocabAutoPlay) {
          const pronunciation = kanaType === 'katakana' ? convertToKatakanaVocab(firstQ.target.wordH) : firstQ.target.wordH;
          playAudio(pronunciation);
        } else {
          if ('speechSynthesis' in window) window.speechSynthesis.cancel();
        }
      };

      const handleAnswer = (option) => {
        if (isAnswered) return;
        
        setIsAnswered(true);
        setSelectedOption(option);
        
        const currentQ = questions[currentIndex];
        if (!currentQ) return;

        let isCorrect = false;

        if (currentQ.type === 'vocab') {
          isCorrect = option.word === currentQ.target.word;
        } else {
          isCorrect = option.r === currentQ.target.r;
        }

        if (isCorrect) {
          setScore(prev => prev + 1);
          setRowScore(prev => prev + 1);
        }
        
        if (currentQ.type === 'vocab') {
          const pronunciation = kanaType === 'katakana' ? convertToKatakanaVocab(currentQ.target.wordH) : currentQ.target.wordH;
          playAudio(pronunciation);
        } else {
          playAudio(kanaType === 'katakana' ? currentQ.target.k : currentQ.target.h);
        }

        setTimeout(() => {
          if (currentIndex + 1 < questions.length) {
            setCurrentIndex(prev => prev + 1);
            setIsAnswered(false);
            setSelectedOption(null);
            
            const nextQ = questions[currentIndex + 1];
            if (nextQ && nextQ.type === 'vocab' && vocabAutoPlay) {
              const pronunciation = kanaType === 'katakana' ? convertToKatakanaVocab(nextQ.target.wordH) : nextQ.target.wordH;
              playAudio(pronunciation);
            }
          } else {
            const activeRowId = selectedRows[currentRowIndex];
            const rowData = GOJUON_DATA.find(r => r.id === activeRowId);
            const rowLabel = kanaType === 'katakana' ? rowData.labelK : rowData.labelH;
            
            const newResult = {
              label: rowLabel,
              score: rowScore + (isCorrect ? 1 : 0),
              total: questions.length
            };
            
            setRowResults(prev => [...prev, newResult]);
            setScreen('transition');
          }
        }, 1500);
      };

      const handleNextRow = () => {
        const nextIndex = currentRowIndex + 1;
        if (nextIndex < selectedRows.length) {
          setCurrentRowIndex(nextIndex);
          startQuizForCurrentRow(nextIndex);
        } else {
          setScreen('result');
        }
      };

      if (screen === 'home') {
        return (
          <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-4 md:p-8">
            <div className="max-w-4xl w-full text-center space-y-8">
              <div className="flex justify-center mb-6">
                <div className="w-28 h-28 bg-indigo-100 text-indigo-600 rounded-[2rem] flex items-center justify-center text-6xl font-black shadow-inner animate-pulse">
                  あ
                </div>
              </div>
              
              <div className="space-y-4">
                <h1 className="text-4xl md:text-5xl lg:text-6xl font-extrabold text-slate-900 tracking-tight">
                  五十音學習與複習系統
                </h1>
                <p className="text-lg md:text-xl text-slate-600 max-w-2xl mx-auto">
                  專為日語學習者設計，採用「單行式循環學習法」，一次學完一行立刻測驗，循序漸進攻克所有五十音。
                </p>
              </div>

              <div className="grid sm:grid-cols-3 gap-6 text-left py-8 max-w-4xl mx-auto">
                <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 hover:shadow-md transition-shadow">
                  <div className="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center mb-4">
                    <BookOpen className="w-6 h-6" />
                  </div>
                  <h3 className="text-xl font-bold text-slate-800 mb-2">單行專注學習</h3>
                  <p className="text-slate-500">自由勾選複習範圍，系統會自動切分為「一行一行」的學習字卡，讓吸收更有效率。</p>
                </div>
                <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 hover:shadow-md transition-shadow">
                  <div className="w-12 h-12 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center mb-4">
                    <Gamepad2 className="w-6 h-6" />
                  </div>
                  <h3 className="text-xl font-bold text-slate-800 mb-2">精準單行測驗</h3>
                  <p className="text-slate-500">學完該行假名立刻進入打亂測驗，混合發音及字彙練習，加深短期記憶。</p>
                </div>
                <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 hover:shadow-md transition-shadow">
                  <div className="w-12 h-12 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mb-4">
                    <Headphones className="w-6 h-6" />
                  </div>
                  <h3 className="text-xl font-bold text-slate-800 mb-2">真人發音與防雷</h3>
                  <p className="text-slate-500">搭載標準日語語音引擎，具備防作弊機制，答題完後才可聽音，落實自我檢測。</p>
                </div>
              </div>

              <button
                onClick={() => setScreen('setup')}
                className="mx-auto w-full max-w-sm py-4 px-8 bg-indigo-600 text-white rounded-full font-bold text-xl hover:bg-indigo-700 hover:scale-105 transition-all shadow-lg shadow-indigo-200 flex items-center justify-center"
              >
                開始設定 <ArrowRight className="ml-2 w-6 h-6" />
              </button>
            </div>
          </div>
        );
      }

      if (screen === 'setup') {
        return (
          <div className="min-h-screen bg-slate-50 text-slate-800 p-4 md:p-8">
            <div className="max-w-3xl mx-auto space-y-6">
              <header className="flex items-center space-x-3 pb-6 border-b border-slate-200">
                <button 
                  onClick={() => setScreen('home')} 
                  className="p-2 -ml-2 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-full transition-all"
                  title="回首頁"
                >
                  <ArrowLeft className="w-6 h-6" />
                </button>
                <SettingsIcon className="w-8 h-8 text-indigo-600" />
                <h1 className="text-2xl font-bold text-slate-900">測驗設定</h1>
              </header>

              <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <h2 className="text-lg font-bold mb-4">1. 選擇假名字體</h2>
                <div className="flex flex-col sm:flex-row gap-4">
                  <label className={`flex-1 flex items-center justify-center p-4 rounded-xl border-2 cursor-pointer transition-all ${kanaType === 'hiragana' ? 'bg-indigo-50 border-indigo-500 text-indigo-700' : 'bg-white border-slate-200 hover:border-indigo-200 text-slate-600'}`}>
                    <input type="radio" name="kanaType" className="sr-only" checked={kanaType === 'hiragana'} onChange={() => setKanaType('hiragana')} />
                    <span className="font-bold text-lg">平假名 (Hiragana)</span>
                  </label>
                  <label className={`flex-1 flex items-center justify-center p-4 rounded-xl border-2 cursor-pointer transition-all ${kanaType === 'katakana' ? 'bg-indigo-50 border-indigo-500 text-indigo-700' : 'bg-white border-slate-200 hover:border-indigo-200 text-slate-600'}`}>
                    <input type="radio" name="kanaType" className="sr-only" checked={kanaType === 'katakana'} onChange={() => setKanaType('katakana')} />
                    <span className="font-bold text-lg">片假名 (Katakana)</span>
                  </label>
                </div>
              </div>

              <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <h2 className="text-lg font-bold mb-4">2. 選擇學習與測驗範圍 <span className="text-sm font-normal text-slate-400 ml-2">(系統將逐行帶您練習)</span></h2>
                
                <div className="mb-4 flex gap-4">
                  <button 
                    onClick={() => handleSelectAll(true)}
                    className="text-sm px-4 py-2 bg-indigo-50 text-indigo-700 font-bold rounded-lg hover:bg-indigo-100 transition-colors"
                  >
                    全選 / 取消 清音
                  </button>
                  <button 
                    onClick={() => handleSelectAll(false)}
                    className="text-sm px-4 py-2 bg-indigo-50 text-indigo-700 font-bold rounded-lg hover:bg-indigo-100 transition-colors"
                  >
                    全選 / 取消 濁音
                  </button>
                </div>

                <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-3">
                  {GOJUON_DATA.map(row => (
                    <label key={row.id} className={`flex items-center p-3 rounded-xl border cursor-pointer transition-all ${selectedRows.includes(row.id) ? 'bg-indigo-50 border-indigo-300' : 'bg-white border-slate-200 hover:border-indigo-200'}`}>
                      <input
                        type="checkbox"
                        className="w-4 h-4 text-indigo-600 rounded border-slate-300 focus:ring-indigo-500 mr-2"
                        checked={selectedRows.includes(row.id)}
                        onChange={() => handleToggleRow(row.id)}
                      />
                      <span className="text-sm font-medium text-slate-700">
                        {kanaType === 'katakana' ? row.labelK : row.labelH}
                      </span>
                    </label>
                  ))}
                </div>
              </div>

              <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <h2 className="text-lg font-bold mb-4">3. 選擇測驗題型 <span className="text-sm font-normal text-slate-400 ml-2">(可複選，每行獨立考驗)</span></h2>
                <div className="flex flex-col space-y-3">
                  <label className={`flex items-center p-4 rounded-xl border-2 cursor-pointer transition-colors ${quizModes.includes('kanaToRomaji') ? 'bg-indigo-50/50 border-indigo-200' : 'border-slate-200 hover:bg-slate-50'}`}>
                    <input type="checkbox" className="w-5 h-5 text-indigo-600 rounded border-slate-300 mr-4" checked={quizModes.includes('kanaToRomaji')} onChange={() => handleToggleQuizMode('kanaToRomaji')} />
                    <span className="font-bold text-slate-700">看假名，選羅馬發音</span>
                  </label>
                  <label className={`flex items-center p-4 rounded-xl border-2 cursor-pointer transition-colors ${quizModes.includes('romajiToKana') ? 'bg-indigo-50/50 border-indigo-200' : 'border-slate-200 hover:bg-slate-50'}`}>
                    <input type="checkbox" className="w-5 h-5 text-indigo-600 rounded border-slate-300 mr-4" checked={quizModes.includes('romajiToKana')} onChange={() => handleToggleQuizMode('romajiToKana')} />
                    <span className="font-bold text-slate-700">看發音，選正確假名</span>
                  </label>
                  
                  <label className={`flex items-start p-4 rounded-xl border-2 cursor-pointer transition-colors ${quizModes.includes('vocab') ? 'bg-indigo-50/50 border-indigo-200' : 'border-slate-200 hover:bg-slate-50'}`}>
                    <div className="mt-1">
                      <input type="checkbox" className="w-5 h-5 text-indigo-600 rounded border-slate-300 mr-4" checked={quizModes.includes('vocab')} onChange={() => handleToggleQuizMode('vocab')} />
                    </div>
                    <div className="flex flex-col w-full">
                      <span className="font-bold text-slate-700">字彙測驗 (各行相關單字)</span>
                      <span className="text-sm text-slate-500 mt-1">
                        目前所選範圍內可用單字數：{availableVocab.length} 題
                      </span>
                      {quizModes.includes('vocab') && (
                        <div className="mt-3 flex items-center" onClick={(e) => e.stopPropagation()}>
                          <label className="flex items-center p-2.5 bg-indigo-100/70 rounded-lg cursor-pointer hover:bg-indigo-200/60 transition-colors">
                            <input 
                              type="checkbox" 
                              className="w-4 h-4 text-indigo-600 rounded border-slate-300 mr-2" 
                              checked={vocabAutoPlay} 
                              onChange={(e) => setVocabAutoPlay(e.target.checked)} 
                            />
                            <span className="text-sm font-bold text-indigo-800">測驗時自動朗讀題目 (聽力複習)</span>
                          </label>
                        </div>
                      )}
                    </div>
                  </label>
                </div>
              </div>

              <button
                onClick={startQuiz}
                disabled={isStartDisabled}
                className="w-full py-5 bg-indigo-600 text-white rounded-2xl font-bold text-xl hover:bg-indigo-700 transition-colors disabled:bg-slate-300 disabled:cursor-not-allowed flex items-center justify-center shadow-lg"
              >
                {isStartDisabled ? '請至少選擇一個範圍與題型' : '開始循序複習'} 
                {!isStartDisabled && <ArrowRight className="ml-2 w-6 h-6" />}
              </button>
            </div>
          </div>
        );
      }

      if (screen === 'learn') {
        if (!learnItems || !learnItems[learnIndex]) return null;
        const currentItem = learnItems[learnIndex];
        const isVocab = currentItem.type === 'vocab';
        
        const mainText = isVocab ? (kanaType === 'katakana' ? convertToKatakanaVocab(currentItem.data.wordH) : currentItem.data.wordH) : (kanaType === 'katakana' ? currentItem.data.k : currentItem.data.h);
        const subText = isVocab ? currentItem.data.meaning : currentItem.data.r;
        
        const activeRowId = selectedRows[currentRowIndex];
        const rowData = GOJUON_DATA.find(r => r.id === activeRowId);
        const rowLabelText = isVocab ? '相關單字' : (kanaType === 'katakana' ? rowData.labelK : rowData.labelH);

        const handleNextLearn = () => {
          if (learnIndex < learnItems.length - 1) {
            const nextIdx = learnIndex + 1;
            setLearnIndex(nextIdx);
            const nextItem = learnItems[nextIdx];
            const pron = nextItem.type === 'vocab' ? (kanaType === 'katakana' ? convertToKatakanaVocab(nextItem.data.wordH) : nextItem.data.wordH) : (kanaType === 'katakana' ? nextItem.data.k : nextItem.data.h);
            playAudio(pron);
          } else {
            proceedToQuiz();
          }
        };

        const handlePrevLearn = () => {
          if (learnIndex > 0) {
            const prevIdx = learnIndex - 1;
            setLearnIndex(prevIdx);
            const prevItem = learnItems[prevIdx];
            const pron = prevItem.type === 'vocab' ? (kanaType === 'katakana' ? convertToKatakanaVocab(prevItem.data.wordH) : prevItem.data.wordH) : (kanaType === 'katakana' ? prevItem.data.k : prevItem.data.h);
            playAudio(pron);
          }
        };

        return (
          <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-4">
            <div className="w-full max-w-lg">
              <div className="flex gap-1.5 justify-center mb-4">
                {selectedRows.map((rowId, idx) => {
                  const rData = GOJUON_DATA.find(r => r.id === rowId);
                  const isActive = idx === currentRowIndex;
                  const isPassed = idx < currentRowIndex;
                  return (
                    <span 
                      key={rowId} 
                      className={`h-2 rounded-full transition-all duration-300 ${isActive ? 'w-8 bg-indigo-600' : isPassed ? 'w-3 bg-emerald-500' : 'w-2 bg-slate-200'}`}
                      title={rData ? (kanaType === 'katakana' ? rData.labelK : rData.labelH) : ''}
                    />
                  );
                })}
              </div>

              <div className="flex justify-between items-center mb-6 px-2">
                <button 
                  onClick={() => {
                    if ('speechSynthesis' in window) window.speechSynthesis.cancel();
                    setScreen('setup');
                  }}
                  className="flex items-center justify-center p-2 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-full transition-all"
                  title="退回設定"
                >
                  <ArrowLeft className="w-6 h-6" />
                </button>
                <span className="text-slate-500 font-bold tracking-wide text-sm bg-white px-3 py-1 rounded-full border border-slate-200 shadow-sm">
                  學習字卡: {learnIndex + 1} / {learnItems.length}
                </span>
                <button 
                  onClick={proceedToQuiz}
                  className="flex items-center text-indigo-600 font-bold bg-indigo-50 hover:bg-indigo-100 px-4 py-1.5 rounded-full text-sm transition-colors"
                >
                  直接測驗 <SkipForward className="ml-1 w-4 h-4" />
                </button>
              </div>

              <div className="bg-white rounded-[2rem] shadow-xl p-10 md:p-14 mb-8 border border-slate-100 flex flex-col items-center relative text-center">
                 <p className="text-sm text-indigo-600 mb-4 font-bold tracking-widest bg-indigo-50 px-4 py-1 rounded-full">
                   — {rowLabelText} 學習 —
                 </p>
                 <h2 className="text-7xl md:text-8xl font-black text-slate-800 mb-6 tracking-wider">
                   {mainText}
                 </h2>
                 <p className="text-2xl text-indigo-600 font-bold">
                   {subText}
                 </p>
                 
                 <button 
                   onClick={() => {
                     const pron = isVocab ? (kanaType === 'katakana' ? convertToKatakanaVocab(currentItem.data.wordH) : currentItem.data.wordH) : (kanaType === 'katakana' ? currentItem.data.k : currentItem.data.h);
                     playAudio(pron);
                   }}
                   className="mt-8 p-4 bg-indigo-50 text-indigo-600 rounded-full hover:bg-indigo-100 transition-colors shadow-sm"
                   title="播放發音"
                 >
                   <Volume2 className="w-8 h-8" />
                 </button>
              </div>

              <div className="flex gap-4">
                <button
                  onClick={handlePrevLearn}
                  disabled={learnIndex === 0}
                  className="flex-1 py-4 bg-white text-slate-600 border-2 border-slate-200 rounded-2xl font-bold text-lg hover:bg-slate-50 hover:border-slate-300 transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center shadow-sm"
                >
                  <ChevronLeft className="mr-2 w-6 h-6" /> 上一張
                </button>
                <button
                  onClick={handleNextLearn}
                  className="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-bold text-lg hover:bg-indigo-700 transition-colors shadow-md flex items-center justify-center"
                >
                  {learnIndex === learnItems.length - 1 ? (
                    <>進入測驗 <ArrowRight className="ml-2 w-6 h-6" /></>
                  ) : (
                    <>下一張 <ChevronRight className="ml-2 w-6 h-6" /></>
                  )}
                </button>
              </div>
            </div>
          </div>
        );
      }

      if (screen === 'quiz') {
        if (!questions || !questions[currentIndex]) return null;
        const currentQ = questions[currentIndex];
        const isVocab = currentQ.type === 'vocab';
        
        const renderQuestion = () => {
          if (isVocab) {
            return (
              <div className="text-center">
                <p className="text-sm text-emerald-600 font-bold mb-2 tracking-widest bg-emerald-50 px-3 py-1 rounded-full inline-block">單字題</p>
                <p className="text-sm text-slate-500 mb-2 font-medium mt-2">請選出下列中文對應的日文</p>
                <h2 className="text-4xl md:text-5xl font-bold text-slate-800 mb-4">{currentQ.target.meaning}</h2>
              </div>
            );
          }
          
          const isRomajiQ = currentQ.format === 'romajiToKana';
          const questionText = isRomajiQ 
            ? currentQ.target.r 
            : (kanaType === 'katakana' ? currentQ.target.k : currentQ.target.h);

          return (
            <div className="text-center">
              <p className="text-sm text-indigo-500 font-bold mb-2 tracking-widest bg-indigo-50 px-3 py-1 rounded-full inline-block">發音題</p>
              <p className="text-sm text-slate-500 mb-2 font-medium mt-2">
                {isRomajiQ ? '請選出正確的假名' : '請選出正確的羅馬拼音'}
              </p>
              <h2 className="text-7xl md:text-8xl font-black text-slate-800 mb-4 tracking-wider">{questionText}</h2>
            </div>

        };

        const renderOptionText = (opt) => {
          if (isVocab) return kanaType === 'katakana' ? convertToKatakanaVocab(opt.wordH) : opt.wordH;
          if (currentQ.format === 'kanaToRomaji') return opt.r;
          return kanaType === 'katakana' ? opt.k : opt.h;
        };

        const showAudioButton = isAnswered || (isVocab && vocabAutoPlay);
        
        const currentRowId = selectedRows[currentRowIndex];
        const rowData = GOJUON_DATA.find(r => r.id === currentRowId);
        const rowLabelText = kanaType === 'katakana' ? rowData.labelK : rowData.labelH;

        return (
          <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-4">
            <div className="w-full max-w-lg">
              <div className="text-center mb-4">
                <span className="text-slate-400 font-bold tracking-widest">
                  — 目前進度：{rowLabelText} ({currentRowIndex + 1}/{selectedRows.length}) —
                </span>
              </div>
              <div className="flex justify-between items-center mb-6 px-2">
                <button 
                  onClick={() => {
                    if ('speechSynthesis' in window) window.speechSynthesis.cancel();
                    setScreen('setup'); 
                  }}
                  className="flex items-center justify-center p-2 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-full transition-all"
                  title="中斷測驗並回設定"
                >
                  <ArrowLeft className="w-6 h-6" />
                </button>
                <span className="text-slate-500 font-bold tracking-wide text-sm bg-white px-3 py-1 rounded-full border border-slate-200 shadow-sm">
                  題號: {currentIndex + 1} / {questions.length}
                </span>
                <span className="text-indigo-600 font-bold bg-indigo-50 px-4 py-1 rounded-full text-sm shadow-sm">
                  本行得分: {rowScore}
                </span>
              </div>

              <div className="bg-white rounded-[2rem] shadow-xl p-8 md:p-12 mb-6 border border-slate-100 flex flex-col items-center relative">
                {renderQuestion()}
                
                <button 
                  onClick={() => {
                    if (isVocab) {
                      const pron = kanaType === 'katakana' ? convertToKatakanaVocab(currentQ.target.wordH) : currentQ.target.wordH;
                      playAudio(pron);
                    } else {
                      playAudio(kanaType === 'katakana' ? currentQ.target.k : currentQ.target.h);
                    }
                  }}
                  className={`p-4 bg-indigo-50 text-indigo-600 rounded-full hover:bg-indigo-100 transition-colors mt-6 shadow-sm border border-indigo-100 ${!showAudioButton ? 'invisible' : 'visible'}`}
                  title="播放發音"
                >
                  <Volume2 className="w-7 h-7" />
                </button>
              </div>

              <div className="grid grid-cols-2 gap-4">
                {currentQ.options.map((opt, i) => {
                  let isCorrectAnswer = false;
                  if (isVocab) {
                     isCorrectAnswer = opt.word === currentQ.target.word;
                  } else {
                     isCorrectAnswer = opt.r === currentQ.target.r;
                  }

                  let btnStyle = "bg-white text-slate-700 border-slate-200 hover:border-indigo-400 hover:bg-indigo-50";
                  
                  if (isAnswered) {
                    if (isCorrectAnswer) {
                      btnStyle = "bg-emerald-500 text-white border-emerald-600 shadow-md transform scale-105 z-10";
                    } else if (selectedOption === opt) {
                      btnStyle = "bg-red-500 text-white border-red-600 opacity-90";
                    } else {
                      btnStyle = "bg-slate-100 text-slate-400 border-slate-200 opacity-50";
                    }
                  }

                  return (
                    <button
                      key={i}
                      disabled={isAnswered}
                      onClick={() => handleAnswer(opt)}
                      className={`
                        py-6 px-4 rounded-[1.5rem] border-2 text-2xl md:text-3xl font-bold transition-all duration-200 
                        flex items-center justify-center relative shadow-sm
                        ${btnStyle}
                      `}
                    >
                      {renderOptionText(opt)}
                      {isAnswered && isCorrectAnswer && (
                        <CheckCircle2 className="absolute top-3 right-3 w-6 h-6 text-white/90" />
                      )}
                      {isAnswered && selectedOption === opt && !isCorrectAnswer && (
                        <XCircle className="absolute top-3 right-3 w-6 h-6 text-white/90" />
                      )}
                    </button>
                  );
                })}
              </div>
            </div>
          </div>
        );
      }

      if (screen === 'transition') {
        const lastResult = rowResults[rowResults.length - 1];
        const nextIndex = currentRowIndex + 1;
        const hasNext = nextIndex < selectedRows.length;
        const nextRowId = hasNext ? selectedRows[nextIndex] : null;
        const nextRowData = hasNext ? GOJUON_DATA.find(r => r.id === nextRowId) : null;
        const nextRowLabel = nextRowData ? (kanaType === 'katakana' ? nextRowData.labelK : nextRowData.labelH) : '';

        const scorePercentage = lastResult && lastResult.total > 0 ? (lastResult.score / lastResult.total) : 0;
        let evaluation = "加油！多複習幾次就會更熟練囉！🌟";
        if (scorePercentage === 1) evaluation = "太厲害了！完美全對！💯";
        else if (scorePercentage >= 0.8) evaluation = "表現優異！手感火熱喔！🔥";
        else if (scorePercentage >= 0.6) evaluation = "表現不錯！及格囉！👍";

        return (
          <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-4">
            <div className="bg-white max-w-md w-full rounded-[2rem] shadow-xl p-10 text-center border border-slate-100">
              <span className="text-xs uppercase tracking-widest text-indigo-500 font-black bg-indigo-50 px-3 py-1 rounded-full">
                關卡挑戰完成
              </span>
              <h2 className="text-3xl font-extrabold text-slate-900 mt-4 mb-2">
                {lastResult?.label} 通關！
              </h2>
              <p className="text-slate-500 font-medium mb-6">{evaluation}</p>

              <div className="bg-slate-50 p-6 rounded-2xl border border-slate-100 mb-8">
                <span className="text-sm font-bold text-slate-400 block mb-1">本行測驗得分</span>
                <span className="text-4xl font-black text-slate-800">
                  {lastResult?.score} <span className="text-2xl text-slate-400">/ {lastResult?.total}</span>
                </span>
              </div>

              <button
                onClick={handleNextRow}
                className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold text-lg hover:bg-indigo-700 transition-colors shadow-md flex items-center justify-center"
              >
                {hasNext ? (
                  <>進入下一行：{nextRowLabel} <ArrowRight className="ml-2 w-5 h-5" /></>
                ) : (
                  <>查看最終總成果 <ArrowRight className="ml-2 w-5 h-5" /></>
                )}
              </button>
            </div>
          </div>
        );
      }

      if (screen === 'result') {
        const totalCorrect = rowResults.reduce((acc, r) => acc + r.score, 0);
        const totalQuestions = rowResults.reduce((acc, r) => acc + r.total, 0);
        const percentage = totalQuestions > 0 ? Math.round((totalCorrect / totalQuestions) * 100) : 0;

        return (
          <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-4 py-8">
            <div className="bg-white max-w-lg w-full rounded-[2rem] shadow-xl p-8 md:p-10 text-center border border-slate-100">
              <h2 className="text-3xl font-bold text-slate-900 mb-2">全部複習完成！</h2>
              <p className="text-slate-500 mb-8 font-medium">您今天非常努力喔，來看看各行成績單：</p>
              
              <div className={`w-36 h-36 mx-auto rounded-full border-[10px] flex items-center justify-center mb-8 shadow-inner
                ${percentage >= 80 ? 'border-emerald-500 text-emerald-500' : percentage >= 60 ? 'border-yellow-500 text-yellow-500' : 'border-red-500 text-red-500'}`}>
                <span className="text-5xl font-black">{percentage}%</span>
              </div>

              <div className="space-y-3 max-h-60 overflow-y-auto border border-slate-100 rounded-2xl p-4 bg-slate-50/50 mb-8">
                <p className="text-xs font-bold text-slate-400 uppercase tracking-wider text-left mb-1">各行學習成績單</p>
                {rowResults.map((res, idx) => (
                  <div key={idx} className="flex justify-between items-center text-sm font-medium py-1.5 border-b border-slate-100 last:border-0">
                    <span className="text-slate-700">{res.label}</span>
                    <div className="flex items-center gap-2">
                      <span className="text-slate-500">{res.score} / {res.total} 答對</span>
                      <span className={`text-xs px-2 py-0.5 rounded-full font-bold ${res.score === res.total ? 'bg-emerald-100 text-emerald-700' : res.score >= res.total * 0.8 ? 'bg-indigo-100 text-indigo-700' : 'bg-slate-100 text-slate-600'}`}>
                        {res.total > 0 ? Math.round((res.score / res.total) * 100) : 0}%
                      </span>
                    </div>
                  </div>
                ))}
              </div>

              <div className="grid grid-cols-2 gap-4 mb-8">
                <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                  <p className="text-sm font-bold text-slate-400 mb-1">總題數</p>
                  <p className="text-3xl font-black text-slate-800">{totalQuestions}</p>
                </div>
                <div className="bg-indigo-50 p-4 rounded-2xl border border-indigo-100">
                  <p className="text-sm font-bold text-indigo-400 mb-1">總答對數</p>
                  <p className="text-3xl font-black text-indigo-600">{totalCorrect}</p>
                </div>
              </div>

              <div className="flex gap-4">
                <button
                  onClick={() => setScreen('setup')}
                  className="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-bold text-lg hover:bg-indigo-700 transition-colors shadow-md flex items-center justify-center"
                >
                  <RotateCcw className="mr-2 w-5 h-5" /> 重新測驗
                </button>
                <button
                  onClick={() => setScreen('home')}
                  className="py-4 px-6 bg-slate-100 text-slate-600 rounded-2xl font-bold hover:bg-slate-200 transition-colors shadow-sm flex items-center justify-center"
                  title="回首頁"
                >
                  <HomeIcon className="w-6 h-6" />
                </button>
              </div>
            </div>
            
            <style dangerouslySetInnerHTML={{__html: `
              .custom-scrollbar::-webkit-scrollbar { width: 6px; }
              .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
              .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
              .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
            `}} />
          </div>
        );
      }

      return null;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
